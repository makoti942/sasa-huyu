<html>
<head>
    <title>Xenon AI</title>
    <script>
        function enhancedReset() {
            // Clear all input fields
            document.querySelectorAll('input[type="text"], input[type="number"]').forEach(input => input.value = '');
            // Optionally, reset other elements
            document.querySelectorAll('textarea').forEach(textarea => textarea.value = '');
            // Provide user feedback
            alert('All fields have been reset!');
        }
    </script>
</head>
<body>
    <h1>Welcome to Xenon AI</h1>
    <input type="text" placeholder="Enter text" />
    <input type="number" placeholder="Enter number" />
    <textarea placeholder="Enter comments"></textarea>
    <button onclick="enhancedReset()">Reset</button>
</body>
</html>
